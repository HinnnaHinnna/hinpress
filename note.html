<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <title>사적 글쓰기 — hinPress</title>
  <style>
    /* ============================================================
       note2.zip / style.css — 원본 그대로
    ============================================================ */
    :root {
      --bg: #fff;
      --text: #0b0b0b;
      --muted: #6b6b6b;
      --line: #e9e9e9;
      --link: #ff00ea;
      /* note2 핑크 링크 색상 */
      --links: #f948eb;
      --chip-bg: #f3f3f3;
      --chip-active: #a3a3a3;
      --content-max: 860px;
      --side-w: 280px;
      --radius: 12px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.6;
      max-width: 100%;
      overflow-x: hidden;
    }

    /* Grid/Flex 아이템이 내용 때문에 폭을 못 줄이는 문제 해결 */
    .layout>* {
      min-width: 0
    }

    /* 긴 URL/단어가 화면을 늘리지 않도록 */
    .doc,
    .doc * {
      overflow-wrap: anywhere;
      word-break: break-word
    }

    .doc a {
      overflow-wrap: anywhere;
      word-break: break-word
    }

    /* 코드블록은 박스 안에서만 스크롤 */
    pre.code-block {
      max-width: 100%;
      overflow: auto
    }

    .muted {
      color: var(--muted)
    }

    /* ===================== 상단 복귀 바 ===================== */
    /* hinPress 포트폴리오로 돌아가는 얇은 바
       — hin의 배경색(#f5f5f5)과 높이(24px) 맞춤 */
    .back-bar {
      background: #f5f5f5;
      border-bottom: 1px solid var(--line);
      height: 24px;
      display: flex;
      align-items: center;
      padding: 0 1rem;
    }

    .back-bar a {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      line-height: 1;
    }

    .back-bar a:hover {
      opacity: 0.6
    }

    /* ===================== 헤더 ===================== */
    .top {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }

    .top-inner {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
    }

    .site-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700
    }

    .site-title a {
      color: inherit;
      text-decoration: none
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
    }

    .btn:hover {
      border-color: #d5d5d5
    }

    .btn.primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text)
    }

    .btn[disabled] {
      opacity: .5;
      cursor: not-allowed
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--chip-bg);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .chip.private {
      background: #fff1f6;
      border-color: #ffd1e8;
      color: #9c2f64;
    }

    .chip.public {
      background: #f3fff6;
      border-color: #c8efd2;
      color: #25623a;
    }

    /* ===================== 레이아웃 ===================== */
    .layout {
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr);
      min-height: calc(100vh - 24px - 57px);
    }

    .sidebar {
      border-right: 1px solid var(--line);
      padding: 18px 14px;
      position: sticky;
      top: 57px;
      align-self: start;
      max-height: calc(100vh - 24px - 57px);
      overflow: auto;
    }

    .sidebar h2 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-bottom: 12px;
      font: inherit;
      box-sizing: border-box;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px 10px;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      border: 1px solid transparent;
    }

    .item:hover {
      background: #fafafa;
      border-color: var(--line)
    }

    .item.active {
      background: #fafafa;
      border-color: var(--line)
    }

    .item .meta {
      font-size: 12px;
      color: var(--muted)
    }

    .main {
      min-width: 0;
      padding: 18px 24px 64px;
      overflow: hidden;
    }

    .wrap {
      width: min(100%, var(--content-max));
      min-width: 0;
      overflow: hidden;
    }

    .breadcrumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .breadcrumbs a {
      color: inherit;
      text-decoration: none
    }

    .doc-title {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      overflow-wrap: anywhere;
      word-break: break-word
    }

    .doc-sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px
    }

    .doc-head-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }

    .doc {
      font-size: 16px;
    }

    .doc p,
    .doc ul,
    .doc ol,
    .doc blockquote,
    .doc pre,
    .doc h1,
    .doc h2,
    .doc h3,
    .doc h4,
    .doc h5,
    .doc h6 {
      max-width: 100%
    }

    .doc img,
    .doc video,
    .doc iframe,
    .doc table {
      max-width: 100%
    }

    .doc a {
      color: var(--links);
      text-decoration: underline;
      text-decoration-thickness: .08em;
      text-underline-offset: .12em;
    }

    .doc hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 28px 0;
    }

    .doc h1,
    .doc h2,
    .doc h3 {
      line-height: 1.25;
      margin-top: 1.7em;
    }

    .doc blockquote {
      margin: 1.2em 0;
      padding: 0 0 0 14px;
      border-left: 3px solid #ddd;
      color: #555;
    }

    .doc table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      display: block;
      overflow: auto
    }

    .doc th,
    .doc td {
      border: 1px solid #e5e5e5;
      padding: 8px 10px;
      text-align: left
    }

    .doc pre {
      overflow-x: auto;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word
    }

    .doc code {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: .1em .35em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
      word-break: break-word
    }

    /* ===================== 에디터 모달 ===================== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .25);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 30;
    }

    .modal-backdrop.open {
      display: flex
    }

    .modal {
      width: min(1100px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .12);
    }

    .modal-head,
    .modal-foot {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line)
    }

    .modal-foot {
      border-bottom: 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-body {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted)
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font: inherit;
      box-sizing: border-box;
    }

    .textarea {
      min-height: 50vh;
      resize: vertical;
    }

    .help {
      font-size: 12px;
      color: var(--muted)
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ===================== 모바일 ===================== */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr
      }

      .sidebar {
        position: static;
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line)
      }

      .main {
        padding: 18px 16px 56px
      }

      .row {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <!-- ============================================================
       상단 포트폴리오 복귀 바

  <div class="back-bar">
    <a href="/">← hinPress 포트폴리오로 돌아가기</a>

  <!-- ============================================================

  <div id="editor-backdrop" class="modal-backdrop" aria-hidden="true">

  <script type="module">
    /* ============================================================

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {

    /* ============================================================

       - 아래 값은 현재 네 hinwriting 프로젝트 기준 예시다.

      messagingSenderId: "262077890310",
      appId: "1:262077890310:web:48dba0a288e081dc83e887",
      measurementId: "G-DKPK500CKF"
    };

    /* ============================================================
       오너 판별값
       - 비공개 문서를 읽고 쓸 수 있는 계정
       - OWNER_UID를 알면 UID까지 넣는 것이 가장 안정적이다.

    const OWNER_EMAIL = "hinnahinna3939@gmail.com";

    const app = initializeApp(firebaseConfig);

    /* ============================================================

    let currentUser = null;

    /* ============================================================
       유틸 함수
       ============================================================ */
    function escapeHtml(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function slugify(text = "") {
      return String(text)
        .toLowerCase()
        .trim()
        .replace(/[^\w\s-가-힣]/g, "")
        .replace(/[\s_-]+/g, "-")
        .replace(/^-+|-+$/g, "") || `note-${Date.now()}`;
    }

    function isOwnerUser(user) {
      if (!user) return false;
      const emailMatch = OWNER_EMAIL && user.email === OWNER_EMAIL;
      const uidMatch = OWNER_UID && user.uid === OWNER_UID;
      return !!(emailMatch || uidMatch);
    }

    function isPageVisibleToCurrentUser(page) {
      const visibility = page?.visibility || "public";
      if (visibility !== "private") return true;
      return canEdit;
    }

    function formatDate(value) {
      if (!value) return "";
      try {
        const d = value?.toDate ? value.toDate() : new Date(value);
        return new Intl.DateTimeFormat("ko-KR", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(d);
      } catch {
        return "";
      }
    }

    /*
      아주 가벼운 Markdown 렌더러
      - 초급자가 보기 쉽게, 외부 라이브러리 없이 기본 문법만 처리한다.
      - 제목, 문단, 링크, 굵게, 기울임, 목록, 코드블록 정도만 반영한다.
    */
    function renderMarkdown(md = "") {
      let text = escapeHtml(md);

      // 코드 블록 ``` ```
      text = text.replace(/```([\s\S]*?)```/g, (_, code) => {
        return `<pre class="code-block"><code>${code}</code></pre>`;
      });

      // 헤딩
      text = text.replace(/^###\s+(.*)$/gm, "<h3>$1</h3>");
      text = text.replace(/^##\s+(.*)$/gm, "<h2>$1</h2>");
      text = text.replace(/^#\s+(.*)$/gm, "<h1>$1</h1>");

      // 굵게 / 기울임
      text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");

      // 링크 [text](url)
      text = text.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      // blockquote
      text = text.replace(/^>\s?(.*)$/gm, "<blockquote>$1</blockquote>");

      // unordered list
      text = text.replace(/(?:^|\n)(-\s.*(?:\n-\s.*)*)/g, (match) => {
        const items = match.trim().split("\n").map(line => `<li>${line.replace(/^-\s/, "")}</li>`).join("");
        return `\n<ul>${items}</ul>`;
      });

      // ordered list
      text = text.replace(/(?:^|\n)(\d+\.\s.*(?:\n\d+\.\s.*)*)/g, (match) => {
        const items = match.trim().split("\n").map(line => `<li>${line.replace(/^\d+\.\s/, "")}</li>`).join("");
        return `\n<ol>${items}</ol>`;
      });

      // 줄바꿈 2개 이상은 문단으로 처리
      text = text
        .split(/\n{2,}/)
        .map(block => {
          const trimmed = block.trim();
          if (!trimmed) return "";
          if (/^<(h\d|ul|ol|li|blockquote|pre)/.test(trimmed)) return trimmed;
          return `<p>${trimmed.replace(/\n/g, "<br>")}</p>`;
        })
        .join("\n");

      return text;
    }

    /* ============================================================
       초기 시드 문서
       - Firestore가 비어 있을 때 오너 로그인 상태에서만 한 번 넣는다.
       - 새 문서는 private 기본값이지만, 이 예시 문서는 public으로 둔다.
       ============================================================ */
    const SEED_PAGES = [
      {
        id: "welcome",
        title: "환영합니다",
        slug: "welcome",
        visibility: "public",
        body: `# 환영합니다\n\n이곳은 **사적 글쓰기** 공간입니다.\n\n- 이 문서는 공개 예시입니다.\n- 새 문서는 기본적으로 비공개로 생성됩니다.\n- 비공개 문서는 오너 로그인 상태에서만 보입니다.`,
      }
    ];

    async function ensureSeedPages() {
      if (!canEdit || hasAttemptedSeed) return;
      hasAttemptedSeed = true;

      const pagesSnap = await getDocs(collection(db, "pages"));
      if (!pagesSnap.empty) return;

      const batch = writeBatch(db);
      for (const page of SEED_PAGES) {
        const pageRef = doc(db, "pages", page.id);
        batch.set(pageRef, {
          ...page,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          updatedBy: currentUser?.email || "owner"
        });
      }
      await batch.commit();
    }

    /* ============================================================
       UI 반영
       ============================================================ */
    function updateAuthUI() {
      if (canEdit && currentUser) {
        authStatusEl.textContent = `오너 로그인: ${currentUser.email || currentUser.uid}`;
        authStatusEl.className = "chip";
        loginBtn.hidden = true;
        logoutBtn.hidden = false;
        newBtn.hidden = false;
      } else {
        authStatusEl.textContent = "읽기 전용";
        authStatusEl.className = "chip";
        loginBtn.hidden = false;
        logoutBtn.hidden = true;
        newBtn.hidden = true;
      }

      editBtn.hidden = !canEdit || !currentPageData;
      deleteBtn.hidden = !canEdit || !currentPageData;
    }

    function updateList() {
      const q = searchInput.value.trim().toLowerCase();
      visiblePages = allPages.filter(page => {
        if (!isPageVisibleToCurrentUser(page)) return false;
        if (!q) return true;
        return (page.title || "").toLowerCase().includes(q)
          || (page.slug || "").toLowerCase().includes(q)
          || (page.body || "").toLowerCase().includes(q);
      });

      docList.innerHTML = "";

      if (!visiblePages.length) {
        docList.innerHTML = `<div class="item"><span class="meta">표시할 문서가 없습니다.</span></div>`;
        return;
      }

      for (const page of visiblePages) {
        const a = document.createElement("a");
        a.href = `#${page.slug || page.id}`;
        a.className = `item ${page.id === currentPageId ? "active" : ""}`;

        const visibility = page.visibility || "public";
        const rightMeta = visibility === "private" ? "비공개" : "공개";

        a.innerHTML = `
          <div>
            <div>${escapeHtml(page.title || "제목 없음")}</div>
            <div class="meta">${escapeHtml(page.slug || page.id)}</div>
          </div>
          <div class="meta">${rightMeta}</div>
        `;

        a.addEventListener("click", (e) => {
          e.preventDefault();
          openPageById(page.id, true);
        });

        docList.appendChild(a);
      }
    }

    function renderPage(page) {
      currentPageData = page;
      currentPageId = page?.id || null;

      updateList();
      updateAuthUI();

      if (!page) {
        breadcrumbs.innerHTML = "";
        docTitle.textContent = "문서를 찾을 수 없습니다.";
        docSub.textContent = "이 문서는 존재하지 않거나 비공개 상태입니다.";
        docBody.innerHTML = "";
        docHeadActions.hidden = true;
        return;
      }

      if (!isPageVisibleToCurrentUser(page)) {
        breadcrumbs.innerHTML = "";
        docTitle.textContent = "비공개 문서입니다.";
        docSub.textContent = "오너 로그인 상태에서만 볼 수 있습니다.";
        docBody.innerHTML = "";
        docHeadActions.hidden = true;
        return;
      }

      breadcrumbs.innerHTML = `<a href="/note.html">문서</a><span>/</span><span>${escapeHtml(page.title || "")}</span>`;
      docTitle.textContent = page.title || "제목 없음";
      docSub.textContent = `마지막 수정: ${formatDate(page.updatedAt)}${page.updatedBy ? ` · ${page.updatedBy}` : ""}`;
      docBody.innerHTML = renderMarkdown(page.body || "");
      docHeadActions.hidden = false;

      const visibility = page.visibility || "public";
      visibilityBadge.textContent = visibility === "private" ? "비공개" : "공개";
      visibilityBadge.className = `chip ${visibility}`;

      editBtn.hidden = !canEdit;
      deleteBtn.hidden = !canEdit;

      if (page.slug) {
        history.replaceState({}, "", `#${page.slug}`);
      }
    }

    /* ============================================================
       페이지 열기
       ============================================================ */
    function openPageById(pageId, pushHash = false) {
      const page = allPages.find(p => p.id === pageId) || null;
      renderPage(page);
      if (pushHash && page?.slug) {
        history.replaceState({}, "", `#${page.slug}`);
      }
    }

    function openPageBySlug(slug) {
      if (!slug) {
        const firstVisible = allPages.find(isPageVisibleToCurrentUser) || null;
        renderPage(firstVisible);
        return;
      }
      const page = allPages.find(p => p.slug === slug) || null;
      renderPage(page);
    }

    /* ============================================================
       Firestore 실시간 구독
       ============================================================ */
    function subscribePages() {
      if (unsubscribePages) unsubscribePages();

      const q = query(collection(db, "pages"), orderBy("updatedAt", "desc"));
      unsubscribePages = onSnapshot(q, async (snap) => {
        allPages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateList();

        const currentHash = location.hash.replace(/^#/, "");
        if (currentHash) {
          openPageBySlug(currentHash);
        } else if (currentPageId) {
          openPageById(currentPageId);
        } else {
          const firstVisible = allPages.find(isPageVisibleToCurrentUser) || null;
          renderPage(firstVisible);
        }
      }, (err) => {
        console.error(err);
      });
    }

    async function loadAll() {
      subscribePages();
    }

    /* ============================================================
       저장 / 삭제 / 리비전
       ============================================================ */
    async function addRevision(pageId, pageData) {
      const revRef = doc(collection(db, "pages", pageId, "revisions"));
      await setDoc(revRef, {
        title: pageData.title,
        slug: pageData.slug,
        body: pageData.body,
        visibility: pageData.visibility || "public",
        updatedAt: serverTimestamp(),
        updatedBy: currentUser?.email || "owner"
      });
    }

    async function savePage() {
      if (!canEdit) {
        alert("오너만 저장할 수 있습니다.");
        return;
      }

      const title = editTitleInput.value.trim();
      const slug = slugify(editSlugInput.value || title);
      const body = editBodyInput.value;
      const visibility = editVisibilitySelect.value || "private";

      if (!title) {
        alert("제목을 입력해 주세요.");
        return;
      }

      const existingId = currentPageId;
      const pageId = existingId || slug;
      const pageRef = doc(db, "pages", pageId);
      const pageSnap = await getDoc(pageRef);

      const pageData = {
        title,
        slug,
        body,
        visibility,
        updatedAt: serverTimestamp(),
        updatedBy: currentUser?.email || "owner"
      };

      if (!pageSnap.exists()) {
        pageData.createdAt = serverTimestamp();
      }

      await setDoc(pageRef, pageData, { merge: true });
      await addRevision(pageId, pageData);
      closeEditor();
      currentPageId = pageId;
    }

    async function deletePageCompletely(pageId) {
      if (!canEdit || !pageId) return;
      const ok = confirm("정말 이 문서를 삭제할까요? 이 작업은 되돌리기 어렵습니다.");
      if (!ok) return;

      const revs = await getDocs(collection(db, "pages", pageId, "revisions"));
      const batch = writeBatch(db);
      revs.forEach(r => batch.delete(r.ref));
      batch.delete(doc(db, "pages", pageId));
      await batch.commit();

      currentPageId = null;
      currentPageData = null;
      history.replaceState({}, "", "/note.html");
    }

    /* ============================================================
       편집 모달 제어
       ============================================================ */
    function openEditor(page = null) {
      if (page) {
        editTitleInput.value = page.title || "";
        editSlugInput.value = page.slug || "";
        editBodyInput.value = page.body || "";
        editVisibilitySelect.value = page.visibility || "public";
      } else {
        editTitleInput.value = "";
        editSlugInput.value = "";
        editBodyInput.value = "";
        editVisibilitySelect.value = "private";
      }
      editorBackdrop.classList.add("open");
      editorBackdrop.setAttribute("aria-hidden", "false");
    }

    function closeEditor() {
      editorBackdrop.classList.remove("open");
      editorBackdrop.setAttribute("aria-hidden", "true");
    }

    /* ============================================================
       히스토리 모달
       ============================================================ */
    async function openHistory() {
      if (!currentPageId) return;
      historyList.innerHTML = `<div class="item"><span class="meta">불러오는 중...</span></div>`;
      historyBackdrop.classList.add("open");
      historyBackdrop.setAttribute("aria-hidden", "false");

      const snap = await getDocs(query(collection(db, "pages", currentPageId, "revisions"), orderBy("updatedAt", "desc")));
      if (snap.empty) {
        historyList.innerHTML = `<div class="item"><span class="meta">히스토리가 없습니다.</span></div>`;
        return;
      }

      historyList.innerHTML = "";
      snap.forEach(d => {
        const data = d.data();
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div>
            <div>${escapeHtml(data.title || "제목 없음")}</div>
            <div class="meta">${formatDate(data.updatedAt)} · ${escapeHtml(data.updatedBy || "")}</div>
          </div>
          <div class="meta">${(data.visibility || "public") === "private" ? "비공개" : "공개"}</div>
        `;
        historyList.appendChild(item);
      });
    }

    function closeHistory() {
      historyBackdrop.classList.remove("open");
      historyBackdrop.setAttribute("aria-hidden", "true");
    }

    /* ============================================================
       로그인 / 로그아웃
       ============================================================ */
    async function login() {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      if (!isOwnerUser(user)) {
        alert("이 구글 계정은 편집 권한이 없어. 오너 계정으로 다시 로그인해줘.");
        await signOut(auth);
        return;
      }
    }

    async function logout() {
      await signOut(auth);
    }

    /* ============================================================
       이벤트 바인딩
       ============================================================ */
    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    newBtn.addEventListener("click", () => openEditor(null));
    editBtn.addEventListener("click", () => openEditor(currentPageData));
    deleteBtn.addEventListener("click", () => deletePageCompletely(currentPageId));
    historyBtn.addEventListener("click", openHistory);
    closeHistoryBtn.addEventListener("click", closeHistory);
    cancelEditBtn.addEventListener("click", closeEditor);
    saveEditBtn.addEventListener("click", savePage);
    searchInput.addEventListener("input", updateList);

    editorBackdrop.addEventListener("click", (e) => {
      if (e.target === editorBackdrop) closeEditor();
    });
    historyBackdrop.addEventListener("click", (e) => {
      if (e.target === historyBackdrop) closeHistory();
    });

    window.addEventListener("hashchange", () => {
      openPageBySlug(location.hash.replace(/^#/, ""));
    });

    /* ============================================================
       인증 상태 감시
       - 로그인 상태가 바뀔 때마다 canEdit, UI, 시드 문서 여부를 갱신한다.
       ============================================================ */
    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      canEdit = !!currentUser && isOwnerUser(currentUser);
      updateAuthUI();
      await ensureSeedPages();
      await loadAll();
    });

    /*
      디버깅용 전역 노출
      - 브라우저 콘솔에서 UID 확인이 필요할 때 사용
      - 예: firebaseAuth.currentUser?.uid
    */
    window.firebaseAuth = auth;
  </script>
</body>
